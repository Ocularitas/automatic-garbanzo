services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: contract-intel-pg
    environment:
      POSTGRES_USER: contract
      POSTGRES_PASSWORD: contract
      POSTGRES_DB: contract_intel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contract -d contract_intel"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
